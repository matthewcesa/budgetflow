version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: budgetflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - budgetflow-postgres-data:/var/lib/postgresql/data

volumes:
  budgetflow-postgres-data: